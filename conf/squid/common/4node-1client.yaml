# Rados test configuration for replica-1 pool
# Deployment for all the ceph daemons , with 2 mon's, 2 mgr's, and 3 OSD daemons
globals:
  ceph-cluster:
    name: ceph
    nodes:
      node1:
        role:
          - _admin
          - mon
          - mgr
          - installer
          - node-exporter
          - alertmanager
          - grafana
          - prometheus
          - crash
      node2:
        role:
          - osd
          - rgw
          - node-exporter
          - crash
        no-of-volumes: 3
        disk-size: 15
      node3:
        role:
          - osd
          - mds
          - rgw
          - node-exporter
          - crash
        no-of-volumes: 3
        disk-size: 15
      node4:
        role:
          - mon
          - mgr
          - osd
          - node-exporter
          - crash
        no-of-volumes: 3
        disk-size: 15
      node5:
        role:
          - client
